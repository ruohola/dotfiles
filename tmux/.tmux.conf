# ============= SETUP =============

set -g default-terminal "tmux-256color"

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix


# ============= SETTINGS =============

# Show info messages for a longer time.
set -g display-time 2000

# Show pane numbers (prefix q) for longer.
set -g display-panes-time 3000

# Allow semi-unlimited scrollback in panes.
set -g history-limit 100000

# Use vi copy mode and readline command mode editing.
set -g mode-keys vi
set -g status-keys emacs

# Enable mouse support and stay in copy mode after mouse selection, allowing a single click to clear the selection and esc to either clear or exit.
set -g mouse on
unbind -T copy-mode-vi MouseDragEnd1Pane
bind -T copy-mode-vi MouseDown1Pane select-pane\; send-keys -X clear-selection
bind -T copy-mode-vi Escape if-shell -F "#{selection_present}" "send-keys -X clear-selection" "send-keys -X cancel"

# Fix iTerm smart selection not respecting working directory.
set -g allow-passthrough on

# Get rid of delay from Esc (needed for Vim meta key  mappings)
set -s escape-time 0

# Start window numbers from 1 and remove number gaps when closing windows.
set -g base-index 1
set -g renumber-windows on
bind 0 select-window -t :=10

# Make Vim `set autoread` work.
set -g focus-events on

# Make the active window stand out more in status bar.
set -g window-status-current-style reverse

# Update status bar 7.5x more often.
set -g status-interval 2

# Show full session name in status bar.
set -g status-left-length 99

# Show full program title in status bar.
set -g status-right-length 99

# Use UTC date in status bar.
set -g status-right '#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,}"#{=99:pane_title}" #(gdate --utc "+%%a %%Y-%%m-%%d %%H:%%M")'


# ============= MAPPINGS =============

# Make these easier to use (matches similar remapping logic in Vim)
bind , command-prompt
bind C-, command-prompt
bind . last-pane
bind \; command-prompt -I "#W" { rename-window "%%" }
bind : command-prompt -T target { move-window -t "%%" }

# Simplify resizing panes.
# (The default meta-arrow-mappings don't work with iTerm2 word-moving override.)
bind -r Left resize-pane -L 1
bind -r Down resize-pane -D 1
bind -r Up resize-pane -U 1
bind -r Right resize-pane -R 1
bind -r C-Left resize-pane -L 5
bind -r C-Down resize-pane -D 5
bind -r C-Up resize-pane -U 5
bind -r C-Right resize-pane -R 5
unbind M-Left
unbind M-Down
unbind M-Up
unbind M-Right

# Open new panes more easily.
unbind %
unbind \"
bind H split-window -h -c "#{pane_current_path}" -b \; select-layout -E
bind J split-window -v -c "#{pane_current_path}" \; select-layout -E
bind K split-window -v -c "#{pane_current_path}" -b \; select-layout -E
bind L split-window -h -c "#{pane_current_path}" \; select-layout -E
bind Y split-window -h -f -c "#{pane_current_path}" -b
bind U split-window -v -f -c "#{pane_current_path}"
bind I split-window -v -f -c "#{pane_current_path}" -b
bind O split-window -h -f -c "#{pane_current_path}"

# Remap away from `L`
bind B switch-client -l

# Open new windows in the current directory.
bind c new-window -c "#{pane_current_path}"

# Allow repeating these.
bind -r n next-window
bind -r C-n next-window
bind -r p previous-window
bind -r C-p previous-window
bind -r l last-window
bind -r C-l last-window

# Easier zoom and unzoom.
bind -r - resize-pane -Z
bind -r C-_ resize-pane -Z

bind f run "~/dotfiles/tmux/vzoom.sh"
bind C-f run "~/dotfiles/tmux/vzoom.sh"

# Remap away from `f`.
bind F command-prompt { find-window -Z "%%" }

# Remap away from `-`.
bind z delete-buffer

# Vim-like copy mode.
bind v copy-mode
bind C-u copy-mode \; send-keys -X halfpage-up
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v if-shell -F '#{selection_present}' { send-keys -X rectangle-toggle } { send-keys -X begin-selection ; send-keys -X rectangle-toggle }
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Y send-keys -X begin-selection \; send-keys -X end-of-line \; send-keys -X cursor-left \; send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-u send-keys -X halfpage-up
bind -T copy-mode-vi C-d send-keys -X halfpage-down
bind -T copy-mode-vi C-b send-keys -X page-up
bind -T copy-mode-vi C-f send-keys -X page-down

# Session manager.
bind s display-popup -EE -w 80% -h 80% "~/dotfiles/scripts/mux"

# Remap away from `s`.
bind S choose-tree -Zs

# Easily copy command output from (other) panes.
bind y display-popup -EE -w 75% -h 75% "tmux-snaglord"

# Git commit browser.
bind g display-popup -EE -w 80% -h 80% -d "#{pane_current_path}" "~/dotfiles/scripts/gg"
bind G display-popup -EE -w 80% -h 80% -d "#{pane_current_path}" "~/dotfiles/scripts/gg --branches --tags --remotes"

# Open Bash in a popup.
bind t display-popup -EE -w 75% -h 75%

# Remap away from `t`.
bind T clock-mode

# Clear scrollback history - mapped into iTerm Cmd-K.
set -g user-keys[0] "\e[1107~"
bind User0 send-keys C-l \; run-shell 'sleep 0.3s' \; clear-history


# ============= NO PREFIX MAPPINGS =============

bind -n C-S-Left swap-window -d -t -1
bind -n C-S-Right swap-window -d -t +1

# File picker: pass through to fzf in bash, otherwise open tmux file picker.
bind -n C-t if-shell -F '#{m:bash,#{pane_current_command}}' \
    'send-keys C-t' \
    'display-popup -EE -w 75% -h 75% "TMUX_FILE_PICKER_FD_FLAGS=\"$FZF_FD_FLAGS\" tmux-file-picker"'
bind C-t send-keys C-t

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
# Also prevents navigational pane wrapping.
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind -n M-h if-shell "$is_vim" { send-keys M-h } { if-shell -F '#{pane_at_left}'   {} { select-pane -L } }
bind -n M-j if-shell "$is_vim" { send-keys M-j } { if-shell -F '#{pane_at_bottom}' {} { select-pane -D } }
bind -n M-k if-shell "$is_vim" { send-keys M-k } { if-shell -F '#{pane_at_top}'    {} { select-pane -U } }
bind -n M-l if-shell "$is_vim" { send-keys M-l } { if-shell -F '#{pane_at_right}'  {} { select-pane -R } }
bind M-h send-keys M-h
bind M-j send-keys M-j
bind M-k send-keys M-k
bind M-l send-keys M-l
bind -T copy-mode-vi M-h if-shell -F '#{pane_at_left}'   {} { select-pane -L }
bind -T copy-mode-vi M-j if-shell -F '#{pane_at_bottom}' {} { select-pane -D }
bind -T copy-mode-vi M-k if-shell -F '#{pane_at_top}'    {} { select-pane -U }
bind -T copy-mode-vi M-l if-shell -F '#{pane_at_right}'  {} { select-pane -R }


# ============= HOOKS =============

# Resize panes to equal sizes when one is closed, keeping the same layout.
set-hook -g pane-exited 'select-layout -E'
# (Not setting the behavior on `prefix x` so that it can be used to override this.)


# ============= PLUGINS =============

set -g @fingers-key [
set -g @fingers-jump-key V
# Highlight GitHub PR references (org/repo#1234 and #1234).
set -g @fingers-pattern-0 '[A-Za-z0-9_-]+/[A-Za-z0-9_.-]+#[0-9]+'
set -g @fingers-pattern-1 '#[0-9]+'
# Smart alt-action: open PRs in browser with `gh`, show commit hashes in a popup.
# (This won't expand a ~)
set -g @fingers-alt-action "$HOME/dotfiles/tmux/fingers-git.sh"
run-shell ~/.tmux/plugins/tmux-fingers/tmux-fingers.tmux
